# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - events-frontend

on:
  push:
    branches:
      - master
    paths:
      - 'frontend/**'
      - '.github/workflows/master_events-frontend.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'frontend/**'
      - '.github/workflows/master_events-frontend.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend workspace
        run: |
          npm run build -w frontend

      - name: Prepare deployment package
        run: |
          rm -rf deploy-frontend
          mkdir -p deploy-frontend
          cp -R frontend/dist/standalone/. deploy-frontend/
          mkdir -p deploy-frontend/dist
          cp -R frontend/dist/static deploy-frontend/dist/static
          cp -R frontend/public deploy-frontend/public

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: frontend-app
          path: deploy-frontend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: frontend-app
          path: frontend-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D269B6D28E904EF28E20BCB47D5DACB7 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2F9EFAB248D343888C011A03EB4FABFD }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_31212CFF80294B17B05A4EB51191784E }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'events-frontend'
          slot-name: 'Production'
          package: frontend-app
          